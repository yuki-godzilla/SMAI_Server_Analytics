[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = '''
/(
  venv_.*
  | \.venv
  | \.black_cache
  | \.ruff_cache
  | \.pytest_cache
  | __pycache__
)/
'''

[tool.ruff]
line-length = 100

[tool.ruff.lint]
extend-select = ["I"]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q"
testpaths = ["tests"]
